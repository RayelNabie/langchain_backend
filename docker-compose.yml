services:
  app:
    build:
      context: .
      dockerfile: docker/Dockerfile
      target: builder
      args:
        NODE_VERSION: 24
    command: yarn run dev
    volumes:
      - .:/app/
      - /app/node_modules
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
    secrets:
      - pg_user
      - pg_pw
      - azure_openai_api_key
      - azure_openai_api_instance_name
      - azure_openai_api_deployment_name
      - azure_openai_api_version
      - azure_openai_api_embeddings_deployment_name
  postgres:
    image: postgres:18.3-alpine
    container_name: postgres
    hostname: postgres
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER_FILE: /run/secrets/pg_user
      POSTGRES_PASSWORD_FILE: /run/secrets/pg_pw
      TZ: Europe/Amsterdam
      PGTZ: Europe/Amsterdam
    secrets:
      - pg_user
      - pg_pw
    volumes:
      - ./data:/var/lib/postgresql
      - ./logs:/var/log/postgresql
    command: >
      postgres -c logging_collector=on
               -c log_directory=/var/log/postgresql
               -c log_filename=postgresql.log
               -c log_statement=all
               -c log_connections=on
               -c log_disconnections=on
               -c log_destination=stderr,csvlog
               -c log_rotation_age=1d
               -c shared_preload_libraries=pg_stat_statements
               -c pg_stat_statements.track=all
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres']
      interval: 2s
      timeout: 10s
      retries: 10
      start_period: 30s
secrets:
  pg_user:
    file: ./secrets/pg_user.txt
  pg_pw:
    file: ./secrets/pg_pw.txt
  azure_openai_api_key:
    file: ./secrets/azure_openai_api_key.txt
  azure_openai_api_instance_name:
    file: ./secrets/azure_openai_api_instance_name.txt
  azure_openai_api_deployment_name:
    file: ./secrets/azure_openai_api_deployment_name.txt
  azure_openai_api_version:
    file: ./secrets/azure_openai_api_version.txt
  azure_openai_api_embeddings_deployment_name:
    file: ./secrets/azure_openai_api_embeddings_deployment_name.txt
